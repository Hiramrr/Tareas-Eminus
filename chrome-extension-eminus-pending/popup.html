<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Miyu Pendientes Eminus</title>
    <style>
      :root {
        --text: #000;
        --bg: #fff;
        --border: #000;
        --muted: #666;
      }
      body {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        width: 320px;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        padding: 16px;
      }
      .title {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 16px;
        text-transform: lowercase;
      }
      .title::before {
        content: "$ ";
      }
      .card {
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 12px;
        margin-bottom: 16px;
      }
      .count {
        font-size: 24px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.2;
        margin-bottom: 4px;
      }
      .meta {
        font-size: 12px;
        color: var(--muted);
      }
      button {
        width: 100%;
        border: 1px solid var(--border);
        padding: 8px 16px;
        background: var(--bg);
        color: var(--text);
        font-weight: 700;
        font-size: 12px;
        line-height: 20px;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: lowercase;
        box-shadow: 2px 2px 0px rgba(0, 0, 0, 1);
        font-family: inherit;
      }
      button::before {
        content: "[ ";
      }
      button::after {
        content: " ]";
      }
      button:hover {
        background: var(--text);
        color: var(--bg);
        box-shadow: 0px 0px 0px rgba(0, 0, 0, 1);
        transform: translate(2px, 2px);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .hint {
        margin-top: 16px;
        font-size: 11px;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">pendientes eminus</h1>
      <div class="card">
        <div id="count" class="count">-</div>
        <div class="meta" id="lastCheck">Sin lectura</div>
      </div>
      <button id="openPanel">abrir_panel</button>
      <div class="hint">> abre Eminus para usar_</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
